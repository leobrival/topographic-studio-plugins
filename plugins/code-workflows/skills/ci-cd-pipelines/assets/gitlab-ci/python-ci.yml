stages:
  - lint
  - test
  - build

variables:
  PYTHON_VERSION: "3.12"
  UV_CACHE_DIR: ".uv-cache"

.python-base:
  image: python:${PYTHON_VERSION}
  cache:
    key:
      files:
        - uv.lock
    paths:
      - ${UV_CACHE_DIR}/
  before_script:
    - pip install uv
    - uv sync --dev

lint:
  extends: .python-base
  stage: lint
  script:
    - uv run ruff check .
    - uv run ruff format --check .
    - uv run mypy .
  rules:
    - if: $CI_PIPELINE_SOURCE == "merge_request_event"
    - if: $CI_COMMIT_BRANCH == $CI_DEFAULT_BRANCH

test:
  extends: .python-base
  stage: test
  parallel:
    matrix:
      - PYTHON_VERSION: ["3.11", "3.12", "3.13"]
  script:
    - uv run pytest --cov=src --cov-report=xml --junitxml=junit.xml
  coverage: '/(?i)total.*? (100(?:\.0+)?\%|[1-9]?\d(?:\.\d+)?\%)$/'
  artifacts:
    reports:
      junit: junit.xml
      coverage_report:
        coverage_format: cobertura
        path: coverage.xml
  rules:
    - if: $CI_PIPELINE_SOURCE == "merge_request_event"
    - if: $CI_COMMIT_BRANCH == $CI_DEFAULT_BRANCH

build:
  extends: .python-base
  stage: build
  script:
    - uv build
  artifacts:
    paths:
      - dist/
    expire_in: 1 week
  rules:
    - if: $CI_COMMIT_BRANCH == $CI_DEFAULT_BRANCH
